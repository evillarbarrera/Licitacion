<header [class.scrolled]="isScrolled || !isHome" [class.on-dark]="isHome && !isScrolled">
  <div class="nav-bar">
    <a routerLink="/" class="logo">Cyber<span>Total</span></a>

    <nav class="nav-center">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        class="nav-link">Licitaciones</a>
      <a routerLink="/how-it-works" routerLinkActive="active" class="nav-link">Cómo Funciona</a>
      <a routerLink="/voting" routerLinkActive="active" class="nav-link">Próximos Productos</a>
    </nav>

    <div class="nav-end">
      <button class="btn btn-primary btn-sm">Mi Cuenta</button>
      <button class="hamburger" (click)="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Drawer -->
<div class="drawer-backdrop" [class.open]="isMenuOpen()" (click)="toggleMenu()"></div>
<nav class="drawer" [class.open]="isMenuOpen()" [class.dark]="isHome">
  <a routerLink="/" class="drawer-link" (click)="toggleMenu()">Licitaciones</a>
  <a routerLink="/how-it-works" class="drawer-link" (click)="toggleMenu()">Cómo Funciona</a>
  <a routerLink="/voting" class="drawer-link" (click)="toggleMenu()">Próximos Productos</a>
  <button class="btn btn-primary w-full mt-4" (click)="toggleMenu()">Mi Cuenta</button>
</nav>

<main>
  <router-outlet></router-outlet>
</main>
